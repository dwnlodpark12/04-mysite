<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../css/all.min.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <script src="../js/jquery-3.5.1.min.js"></script>
  <style>
   .room {
     display: flex;
   }
   .box {
     text-align: center;
     width: 50px;
     height: 50px;
     border-radius: 50%;
     border: 2px solid #000000;
     margin: 50px;
     line-height: 48px;
     transition: all 1s;
   }

  </style>
</head>
<body>
  <div>
    <ul class="menu">
        <li>학교 소개 메뉴
            <ul class="hide">
                <li>메뉴 1-1</li>
                <li>메뉴 1-2</li>
                <li>메뉴 1-3</li>
                <li>메뉴 1-4</li>
                <li>메뉴 1-5</li>
                <li>메뉴 1-6</li>
            </ul>
        </li>

        <li>시설 소개 메뉴
            <ul class="hide">
                <li>메뉴 2-1</li>
                <li>메뉴 2-2</li>
                <li>메뉴 2-3</li>
                <li>메뉴 2-4</li>
                <li>메뉴 2-5</li>
                <li>메뉴 2-6</li>
            </ul>
        </li>
    </ul>
</div>
</body>
  <script>
    $(function() {

$(".menu>li").mouseover( function(){
$(this).find().stop().slideDown();
});

$(".menu>li").mouseleave( function(){
$(this).find().stop().slideUp();
});

});
  </script>
</html>
