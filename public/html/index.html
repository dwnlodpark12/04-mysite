<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Breton</title>
	<link rel="stylesheet" href="../css/all.min.css">
	<link rel="stylesheet" href="../css/bootstrap.min.css">
	<link rel="stylesheet" href="../css/base.css">
	<link rel="stylesheet" href="../css/index.css">
	<script src="../js/jquery-3.5.1.min.js"></script>
	<script src="../js/wow.min.js"></script>
</head>

<body>
	<!-- header -->
	<div class="header-bg"></div>
	<div class="header-wrap">
		<div class="header-top">
			<div class="ht-free">Free shiping for orders over €150 and free returns</div>
			<div class="ht-cont">
				<a href="#" class="contact">Contact Us</a>
				<a href="#" class="about">About</a>
			</div>
		</div>
		<div class="header-bottom">
			<div class="hb-left">
				<div class="logo"><img src="../img/logo (1).png" alt="로고"></div>
					<ul class="navi-wrap">
						<li class="navi">HOME</li>
						<li class="navi">PAGES</li>
						<li class="navi">PORTFOLIO</li>
						<li class="navi">BLOG</li>
						<li class="navi">SHOP</li>
					</ul>
			</div>
			<div class="hb-right">
				<div class="bag">SHOPPING BAG<span>0</span>
					<div class="msg-box"></div>
				</div>
				<div class="dark-mode">
					<div class="sun"><img src="../img/sun.svg" alt="day-mode"></div>
						<div class="switch">
							<div class="circle"></div>
					</div>
					<div class="moon"><img src="../img/moon.svg" alt="night-mode"></div>
				</div>
				<div class="tab-bar">
					<span></span>
					<span></span>
					<div class="slide-wrap"></div>
				</div>
			</div>
		</div>
	</div>
	<!-- /header -->
	<script src="../js/index.js"></script>
</body>

</html>
