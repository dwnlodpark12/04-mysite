	<div class="header-top">
		<div class="ht-free">Free shiping for orders over €150 and free returns</div>
		<div class="ht-cont">
			<a href="#" class="contact">Contact Us</a>
			<a href="#" class="about">About</a>
		</div>
	</div>
</div>
<div class="header-wrap">


	<div class="header-bottom">
		<div class="hb-left">
			<div class="logo"><img src="../img/logo (1).png" alt="로고"></div>
			<ul class="navi-wrap">
				<li class="navi">HOME</li>
				<li class="navi">PAGES</li>
				<li class="navi">PORTFOLIO</li>

			</div>
			<div class="dark-mode">
				<div class="sun"><img src="../img/sun.svg" alt="day-mode"></div>
				<div class="switch">
					<a class="dot"></a>
				</div>
				<div class="moon"><img src="../img/moon.svg" alt="night-mode"></div>
			</div>
			<div class="tab-bar">
				<div class="bar"></div>

			</div>
		</div>
	</div>

	<div class="main-left">

			<img src="../img/main0.jpg" alt="메인이미지">
		</div>
		<div class="title">
			<h2>● WELCOME TO OUR WORLD </h2>
			<p>Selected</p><br>
			<p>arrivals</p>
		</div>
		</div>
	</div>	
	<div class="main-right">

			<img src="" alt="">

			<div class="detail">
				<div class="name"></div>
				<div class="exp"></div>
				<div class="price"></div>
			</div>
		</div>	
		<div class="dot active"></div>	
		<div class="dot"></div>	
		<div class="dot"></div>	
		<div class="dot"></div>	
	</div>
